<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>HTTP助手</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="../common-libs/bootstrap-combined.min.css" rel="stylesheet">
    <link href="../common-libs/layoutit.css" rel="stylesheet">

    <!-- jQuery文件。务必在bootstrap.min.js 之前引入 -->
    <script src="../common-libs/jquery-2.0.0.min.js"></script>

    <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
    <script src="../common-libs/bootstrap.min.js"></script>
    <style>
        .control-label {
            width: 60px !important;
        }

        .controls {
            margin-left: 80px !important;
        }
    </style>
</head>

<body style="margin-left:20px">
<div class="container-fluid">
    <div class="row-fluid">

        <div class="span12">
            <h3>
                HTTP助手
            </h3>

            <div class="tabbable" id="tabs-589818"><!-- Only required for left/right tabs -->
                <ul class="nav nav-tabs">
                    <li class="active"><a data-toggle="tab" href="#panel-217771">首页</a></li>
                    <li><a data-toggle="tab" href="#panel-356082">关于</a></li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane active" id="panel-217771">
                        <div class="row-fluid">
                            <form class="form-horizontal">
                                <div class="span5">
                                    <div class="control-group"><label class="control-label" contenteditable="true"
                                                                      for="host">主机</label>
                                        <div class="controls"><input id="host" placeholder="请输入目标IP或者域名" type="text"/>
                                        </div>
                                    </div>
                                </div>
                                <div class="span3">
                                    <div class="control-group"><label class="control-label" contenteditable="true"
                                                                      for="host">端口</label>
                                        <div class="controls"><input id="port"  style="width: 50px" placeholder="端口号" type="text" value="443"/>
                                        </div>
                                    </div>
                                </div>
                                <div class="span1">
                                    <div class="form-check-inline">
                                        <label class="form-check-label">
                                            <input type="checkbox" class="form-check-input" value="SSL" name="type" checked>SSL
                                        </label>

                                    </div>
                                    <!--<div class="control-group">
                                        <label class="control-label" contenteditable="true" for="type">请求类型</label>
                                        <div class="controls" id="type"><input type="radio" class="form-check-input" name="type"
                                                                     value="HTTP" checked>HTTP
                                            <input type="radio" class="form-check-input" name="type" value="SSL">HTTPS
                                        </div>
                                    </div>-->
                                </div>
                                <div class="span3">
                                    <div class="control-group">
                                        <div class="controls text-left"><button id="runBtn" class="btn btn-primary" type="button">发送</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div class="row-fluid">
                            <div class="span6">
                                <form class="form-horizontal">
                                    <fieldset>
                                        <legend>请求体</legend>
                                        <div class="control-group">
                                            <textarea class="form-control" style="width: 80%" id="requestBody"
                                                      rows="20" value="GET / HTTP/1.0"></textarea>

                                        </div>

                                    </fieldset>
                                </form>
                            </div>
                            <div class="span6">
                                <form class="form-horizontal">
                                    <fieldset>
                                        <legend>响应体</legend>
                                        <div class="control-group">
                                            <textarea class="form-control" style="width: 80%" id="responseBody"
                                                      rows="20"></textarea>

                                        </div>

                                    </fieldset>
                                </form>
                            </div>
                        </div>

                    </div>

                    <div class="tab-pane" id="panel-356082">
                        HTTP助手是用来在目标上发起HTTP/HTTPS请求的一个插件。
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
<script>

    $(document).ready(function () {

        $('#runBtn').click(function (event) {
            var host = $('#host').val();
            var port = $('#port').val();
            var ssl= $('input[type=checkbox][name=type]')[0].checked;
            alert(ssl);
            var requestBody= $('#requestBody').val();
            var result='';
            if (ssl)
            {
                result = PluginTools.sendHTTPS(host,port,requestBody);
            }
            else
            {
                alert('start to send http')
                alert(PluginTools)
                result = PluginTools.sendHTTP(host,port,requestBody);
            }

        });
    });
    function onResult(msg)
    {
        $('#responseBody').text(atob(msg));
    }
    function onSetHost(host)
    {
        $('#host').val(host);
    }
    function onSetPort(port)
    {
        $('#port').val(port);
    }
</script>
</html>
